name: Build WanXiangPOS EXE Installer

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1. 检出源码
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. 搭建 Java 17 编译环境
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 3. 编译后端 JAR
      - name: Build Backend (Maven)
        working-directory: ./money-pos
        run: mvn clean package -DskipTests

      # 4. 搭建 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './money-pos-web/package-lock.json'

      # 5. 编译前端 Vue 静态文件
      - name: Build Frontend (Vue)
        working-directory: ./money-pos-web
        run: |
          npm install
          npm run build

      # 6. 下载并准备 JRE 与 MariaDB 环境
      - name: Prepare External Environments (JRE & MariaDB)
        shell: powershell
        run: |
          mkdir build-env
          cd build-env
          
          # --- 下载并处理 JRE ---
          echo "Downloading JRE 17..."
          $jreUrl = "https://github.com/adoptium/temurin17-binaries/releases/download/jdk-17.0.10%2B7/OpenJDK17U-jre_x64_windows_hotspot_17.0.10_7.zip"
          Invoke-WebRequest -Uri $jreUrl -OutFile "jre.zip"
          Expand-Archive -Path "jre.zip" -DestinationPath "."
          Get-ChildItem -Path "jdk*" | Rename-Item -NewName "jre"
          Remove-Item "jre.zip"
          
          # --- 下载并处理 MariaDB ---
          echo "Downloading MariaDB 10.11..."
          $dbUrl = "https://archive.mariadb.org/mariadb-10.11.6/winx64-packages/mariadb-10.11.6-winx64.zip"
          Invoke-WebRequest -Uri $dbUrl -OutFile "mariadb.zip"
          Expand-Archive -Path "mariadb.zip" -DestinationPath "."
          Get-ChildItem -Path "mariadb-10*" | Rename-Item -NewName "mariadb"
          Remove-Item "mariadb.zip"
          
          # 极致瘦身
          Remove-Item -Recurse -Force "mariadb/mysql-test" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "mariadb/sql-bench" -ErrorAction SilentlyContinue

      # 7. 🌟 绝对防御：统一物资装箱！把所有外部依赖搬进 frontend 目录
      - name: Assemble All Resources
        shell: powershell
        run: |
          echo "组装后端 JAR 包..."
          New-Item -ItemType Directory -Force -Path "money-pos-web/backend"
          Copy-Item -Path "money-pos/qk-money-app/money-app-biz/target/*.jar" -Destination "money-pos-web/backend/money-pos.jar" -Force
          
          echo "搬运 JRE 和 MariaDB..."
          Move-Item -Path "build-env/jre" -Destination "money-pos-web/jre" -Force
          Move-Item -Path "build-env/mariadb" -Destination "money-pos-web/mariadb" -Force

      # 8. 开始 Electron 封包
      - name: Build Electron EXE
        working-directory: ./money-pos-web
        run: |
          npm run electron:build

      # 9. 上传最终成品
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WanXiangPOS-Installer
          path: money-pos-web/release/*.exe