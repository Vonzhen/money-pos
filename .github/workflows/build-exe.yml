name: Build MoneyPOS EXE Installer

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1. 检出源码 (升级到 v4)
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. 搭建 Java 17 (升级到 v4)
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 3. 编译后端
      - name: Build Backend (Maven)
        working-directory: ./money-pos
        run: mvn clean package -DskipTests

      # 4. 搭建 Node.js (升级到 v4)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './money-pos-web/package-lock.json'

      # 5. 编译前端
      - name: Build Frontend (Vue)
        working-directory: ./money-pos-web
        run: |
          npm install
          npm run build

      # 6. 下载便携运行环境 (保持不变)
      - name: Prepare External Environments (JRE & MariaDB)
        shell: powershell
        run: |
          mkdir build-env
          cd build-env
          echo "Downloading JRE..."
          Invoke-WebRequest -Uri "https://github.com/adoptium/temurin17-binaries/releases/download/jdk-17.0.9%2B9/OpenJDK17U-jre_x64_windows_hotspot_17.0.9_9.1.zip" -OutFile "jre.zip"
          Expand-Archive -Path "jre.zip" -DestinationPath "."
          # 注意：解压后的文件夹名可能因官方微调而变，使用通配符重命名更稳
          Get-ChildItem -Path "jdk*" | Rename-Item -NewName "jre"
          Remove-Item "jre.zip"
          
          echo "Downloading MariaDB..."
          Invoke-WebRequest -Uri "https://archive.mariadb.org/mariadb-10.11.6/winx64-packages/mariadb-10.11.6-winx64.zip" -OutFile "mariadb.zip"
          Expand-Archive -Path "mariadb.zip" -DestinationPath "."
          Get-ChildItem -Path "mariadb-10*" | Rename-Item -NewName "mariadb"
          Remove-Item "mariadb.zip"
          
          Remove-Item -Recurse -Force "mariadb/mysql-test" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "mariadb/sql-bench" -ErrorAction SilentlyContinue

      # 7. Electron 打包
      - name: Build Electron EXE
        working-directory: ./money-pos-web
        run: |
          npm install
          npm run electron:build

      # 8. 上传 Artifact (🌟 核心修复：升级到 v4)
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MoneyPOS-Installer
          path: money-pos-web/release/*.exe