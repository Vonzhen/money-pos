spring:
  config:
    # 引入对象存储的配置
    import: oss.properties
  # mysql / mariadb 基础配置
  datasource:
    # 如果存在多个数据源，监控的时候可以通过名字来区分开来
    name: mysql
    # 【战略清空】：以下三项由 AppWorkspace 动态注入，不再 YML 中写死，实现真正的解压即用
    # url: jdbc:mysql://127.0.0.1:3306/money_pos...
    # username: root
    # password: ...

    # 使用 Hikari 数据池（保持原有高性能参数）
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      minimum-idle: 5
      idle-timeout: 180000
      maximum-pool-size: 10
      auto-commit: true
      pool-name: MyHikariCP
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1

  # redis 配置（单机版建议配合 application-money.yml 中的 hutool 缓存使用）
  redis:
    host: 127.0.0.1 # 修正为本地回路
    database: 0
    port: 6379
    password:
    timeout: 1000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1ms

  # spring boot admin (单机版如无监控服务器，可保持默认或注释)
  boot:
    admin:
      client:
        url: http://127.0.0.1:9999

# 定时任务 XXL-JOB (单机版建议保持本地化)
xxl:
  job:
    access-token: MONEY
    admin:
      address: http://127.0.0.1:8000/xxl-job-admin
    executor:
      app-name: ${spring.application.name}
      log-path: log/xxl-job/jobhandler
      log-retention-days: 30

# 系统监控端点
management:
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    health:
      show-details: ALWAYS
    logfile:
      external-file: log/service.log

# 钱柜单机版核心存储定义
money:
  storage:
    local:
      # 【核心清扫】：不再硬编码 D:/money-pos/uploads/
      # 路径由 AppWorkspace.java 动态探测 D 盘后注入到环境变量 local.bucket 中
      # path: D:/money-pos/uploads/

      # 前端访问的域名，指向你的后端端口（保持不变）
      domain: http://localhost:9101/money-pos/assets/