money:
  web:
    # 全局响应处理器
    response-handler: true
    # 全局异常处理器
    exception-handler: true
    # 全局请求日志切面
    web-log-aspect:
      enabled: true
      mode: ignore_get_result
    # 多语言
    i18n:
      enabled: true
      support:
        - en
    # 多时区
    timezone:
      enabled: true
      default-time-zone: GMT+08:00
  # 多租户
  tenant:
    enabled: true
    header: Y-tenant
    default-tenant-id: "0"
    ignore-table:
      - sys_tenant
      - sys_dict
      - sys_dict_detail
      - provinces
  # 缓存
  cache:
    local:
      provider: hutool
      hutool:
        strategy: LRU
        capacity: 102400
        ttl: 86400000
    redis:
      enabled: false
      ttl: 86400000
  # 安全配置中心
  security:
    # 🌟 找回丢失的 Token 核心配置 (解决报错的关键)
    token:
      header: Authorization
      token-type: Bearer
      secret: money
      ttl: 2592000000
      refresh-ttl: 2592000000
      strategy: jwt
      cache-key: "security:token:"
    # 忽略的白名单
    ignore:
      get:
        - /tenants/byCode
        - /auth/refreshToken
        - /common/display-settings
      post:
        - /auth/login
        - /auth/logout
        - /common/upload
      put:
        - /common/display-settings
      pattern:
        - /error/**
        - /actuator/**
        - /swagger**/**
        - /webjars/**
        - /v3/**
        - /assets/**
        - /ws/** # 🌟 核心规范新增：放行 WebSocket 握手协议

  # 邮件服务
  mail:
    host: smtp.shahow.top
    username: qk-money@money.shahow.top
    password: Vv123456#
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
    port: 465
    protocol: smtps
    default-encoding: utf-8
    fromAlias: 麦尼

# 🌟 严格执行：spring 必须顶格，不能缩进在 money 里面！
spring:
  sql:
    init:
      mode: never
      continue-on-error: true